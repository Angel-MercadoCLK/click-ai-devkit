name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Set up GoReleaser
        if: matrix.os == 'windows-latest'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          install-only: true

      - name: Build Windows package candidate
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: goreleaser build --snapshot --clean --single-target --skip=validate

      - name: Smoke packaged Windows click.exe
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # A --snapshot build embeds a 0.0.0-SNAPSHOT-<sha> version, never the release version in
          # bucket/click.json (the real version is injected only when building from the v* tag). So the
          # CI smoke verifies the packaged binary runs end-to-end and prints a version line; exact
          # release-version consistency is already covered by the manifest<->bucket sync test and the
          # tagged release build.
          ./scripts/windows-package-smoke.ps1 -DistDir dist -ExpectedVersion 'click version'
