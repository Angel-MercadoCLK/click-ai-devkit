name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Set up GoReleaser
        if: matrix.os == 'windows-latest'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          install-only: true

      - name: Build Windows package candidate
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: goreleaser build --snapshot --clean --single-target --skip=validate

      - name: Smoke packaged Windows click.exe
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = (Get-Content -Raw "bucket/click.json" | ConvertFrom-Json).version
          ./scripts/windows-package-smoke.ps1 -DistDir dist -ExpectedVersion $version
