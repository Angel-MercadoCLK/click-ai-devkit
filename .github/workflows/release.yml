name: release

on:
  push:
    tags:
      - "v*"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Prepare release manifest values
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ENGRAM_VERSION_VALUE="$(tr -d '[:space:]' < ENGRAM_VERSION)"
          export VERSION ENGRAM_VERSION_VALUE
          python - <<'PY'
          from pathlib import Path
          import os
          version = os.environ["VERSION"]
          engram = os.environ["ENGRAM_VERSION_VALUE"]
          path = Path("internal/manifest/manifest.yaml")
          lines = path.read_text().splitlines()
          out = []
          in_engram = False
          for line in lines:
              stripped = line.strip()
              if stripped.startswith("click_version:"):
                  out.append(f'click_version: "{version}"')
                  continue
              if stripped == "engram:":
                  in_engram = True
                  out.append(line)
                  continue
              if in_engram and stripped.startswith("version:"):
                  prefix = line[: line.index("version:")]
                  out.append(f'{prefix}version: "{engram}"')
                  in_engram = False
                  continue
              out.append(line)
          path.write_text("\n".join(out) + "\n")
          PY

      # v0.1: the scoop manifest is published into THIS repo (bucket/ folder), so the default
      # Actions GITHUB_TOKEN is enough — no SCOOP_BUCKET_TOKEN secret to create or manage.
      # brews publishing is skip_upload=true (deferred fast-follow, D17) so no HOMEBREW_TAP_TOKEN yet.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
