# manifest.yaml — generated by the release pipeline, one per click-ai-devkit release.
# Release values are patched from the tag and ENGRAM_VERSION by the release pipeline.
# Schema: tech-spec.md §2.3. No .claude-plugin/marketplace.json — this file is the source of
# truth for what "this click-ai-devkit release" means (D16).
schema_version: 1
click_version: "0.5.2"
engram:
  # must match the repo-root ENGRAM_VERSION file (release.yml patches this value from it at
  # release time; internal/manifest/engram_version_sync_test.go guards them matching in between).
  version: "v1.19.0"
  source: "github.com/Gentleman-Programming/engram"
plugins:
  click-sdd:
    version: "0.1.0"
    path: "plugins/click-sdd"
  click-memory:
    version: "0.1.0"
    path: "plugins/click-memory"
  click-review:
    version: "0.1.0"
    path: "plugins/click-review"
  click-skills:
    version: "0.1.0"
    path: "plugins/click-skills"
min_claude_code_version: "1.x"

# Optional Engram Cloud enrollment config. Server URL and project name are non-secret and may be
# shipped in the release manifest; the per-developer token is always supplied via ENGRAM_CLOUD_TOKEN
# at runtime and is never committed (engram-cloud-wiring design).
engram_cloud:
  server: ""
  project: ""
