categories:
  - name: pii
    reason: "blocked: detected pii"
    rules:
      - id: pii/email
        description: "Email addresses are always forbidden in memory."
        pattern: '(?i)\b[A-Z0-9._%+\-]+@[A-Z0-9.\-]+\.[A-Z]{2,}\b'
      - id: pii/dni
        # Tuned like the policy/claim/customer placeholders: the bare `\b[0-9]{7,8}\b` pattern
        # false-positived on ANY standalone 7-8 digit run (release dates like 20260716, build
        # counters, issue numbers), making memory unusable for routine technical content. It now
        # requires a document keyword (dni/documento/cedula/carnet) before the digit run, so a real
        # labeled DNI still blocks while bare numbers pass. Trade-off (accepted): an UNLABELED bare
        # DNI is no longer caught — revisit once real Click document formats are confirmed.
        description: "DNI-like numbers preceded by a document keyword (TODO: confirm real Click document formats before shipping)."
        pattern: '(?i)\b(?:dni|documento|cedula|carnet)\b[:\s#-]*[0-9]{7,8}\b'
      - id: pii/cuit-cuil
        description: "Argentine CUIT/CUIL identifiers."
        pattern: '\b[0-9]{2}-?[0-9]{8}-?[0-9]\b'
      - id: pii/phone
        description: "Argentine phone numbers, especially when labeled or country-coded."
        pattern: '(?i)(?:\+54\s?9?\s?[0-9]{2,4}[\s-]?[0-9]{3,4}[\s-]?[0-9]{4}\b|(?:tel[eé]fono|celular|whatsapp|phone)[:\s-]*[0-9]{2,4}[\s-]?[0-9]{3,4}[\s-]?[0-9]{4}\b)'
  - name: amounts
    reason: "blocked: detected monetary amount"
    rules:
      - id: amounts/ars-symbol
        description: "Amounts prefixed with currency symbol."
        pattern: '(?i)\$\s?[0-9]+(?:[.,][0-9]{3})*(?:[.,][0-9]{2})?\b'
      - id: amounts/ars-code
        description: "Amounts prefixed with ARS currency code."
        pattern: '(?i)\bARS\s?[0-9]+(?:[.,][0-9]{3})*(?:[.,][0-9]{2})?\b'
  - name: policy-numbers
    reason: "blocked: detected policy number"
    rules:
      - id: policy-numbers/placeholder
        # Placeholder policy-number format for v0.1 (TODO: confirm real Click policy formats before
        # shipping). T2-3 tuning discriminator: the ID token must CONTAIN A DIGIT anywhere
        # ([A-Z0-9-]*[0-9][A-Z0-9-]* — RE2 has no lookahead, and this forces >=1 digit at any
        # position, index 0 included). Real IDs carry digits; prose words ("policy layer", "policy
        # enforcement", "the policy is") do not, so they no longer false-positive — a precision gain,
        # not a coverage cut (every structured ID in engine_test.go has a digit). The abbreviated
        # keyword "pol" is KEPT but pinned to a whole word (\bpol\b) so it catches the day-to-day
        # abbreviation "Pol 12-345-6" WITHOUT matching prose words that merely start with those
        # letters ("polygon", "polling", "pollution").
        description: "Placeholder policy-number format for v0.1: policy keyword (incl. whole-word 'pol') + a digit-bearing ID token (TODO: confirm real Click policy formats before shipping)."
        pattern: '(?i)\b(?:p[oó]liza|policy|pol)\b[:\s#-]*[A-Z0-9-]*[0-9][A-Z0-9-]*\b'
  - name: claim-ids
    reason: "blocked: detected claim identifier"
    rules:
      - id: claim-ids/placeholder
        # T2-3 tuning: require the ID token to CONTAIN A DIGIT anywhere, so prose like "claim that",
        # "claim identifier", "the claim-ids category", "sin conflicto" no longer false-positives
        # while a real reference ("Siniestro SIN-2026-000123") still blocks. The abbreviated keyword
        # "sin" (siniestro) is KEPT but pinned to a whole word (\bsin\b) so it catches "Sin 123456"
        # WITHOUT matching prose words that merely start with those letters ("single", "since",
        # "sinusoid"). This is the R1-001 correction: dropping "sin"/"pol" entirely was an
        # over-correction that lost coverage of the domain's own everyday abbreviations.
        description: "Placeholder claim-id format for v0.1: claim keyword (incl. whole-word 'sin') + a digit-bearing ID token (TODO: confirm real Click siniestro formats before shipping)."
        pattern: '(?i)\b(?:siniestro|claim|sin)\b[:\s#-]*[A-Z0-9-]*[0-9][A-Z0-9-]*\b'
  - name: customer-identifiers
    reason: "blocked: detected customer identifier"
    rules:
      - id: customer-identifiers/placeholder
        # T2-3 tuning: require the ID token to CONTAIN A DIGIT anywhere, so "customer data",
        # "customer identifiers", "customer boundary" no longer false-positive while "customer-id
        # CLI-998877" still blocks. (No whole-word abbreviation change here — customer/cliente had no
        # bare-abbreviation alternative to restore, unlike sin/pol above.)
        description: "Placeholder customer-id format for v0.1: keyword + a digit-bearing ID token (TODO: confirm real Click customer identifier formats before shipping)."
        pattern: '(?i)\b(?:customer|cliente)[-_\s]*(?:id|identifier|number|nro)?[:\s#-]*[A-Z0-9-]*[0-9][A-Z0-9-]*\b'
