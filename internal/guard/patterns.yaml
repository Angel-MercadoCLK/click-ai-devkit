categories:
  - name: pii
    reason: "blocked: detected pii"
    rules:
      - id: pii/email
        description: "Email addresses are always forbidden in memory."
        pattern: '(?i)\b[A-Z0-9._%+\-]+@[A-Z0-9.\-]+\.[A-Z]{2,}\b'
      - id: pii/dni
        description: "Argentine DNI-like numbers (TODO: confirm additional Click-specific context cues if false positives appear)."
        pattern: '\b[0-9]{7,8}\b'
      - id: pii/cuit-cuil
        description: "Argentine CUIT/CUIL identifiers."
        pattern: '\b[0-9]{2}-?[0-9]{8}-?[0-9]\b'
      - id: pii/phone
        description: "Argentine phone numbers, especially when labeled or country-coded."
        pattern: '(?i)(?:\+54\s?9?\s?[0-9]{2,4}[\s-]?[0-9]{3,4}[\s-]?[0-9]{4}\b|(?:tel[eé]fono|celular|whatsapp|phone)[:\s-]*[0-9]{2,4}[\s-]?[0-9]{3,4}[\s-]?[0-9]{4}\b)'
  - name: amounts
    reason: "blocked: detected monetary amount"
    rules:
      - id: amounts/ars-symbol
        description: "Amounts prefixed with currency symbol."
        pattern: '(?i)\$\s?[0-9]+(?:[.,][0-9]{3})*(?:[.,][0-9]{2})?\b'
      - id: amounts/ars-code
        description: "Amounts prefixed with ARS currency code."
        pattern: '(?i)\bARS\s?[0-9]+(?:[.,][0-9]{3})*(?:[.,][0-9]{2})?\b'
  - name: policy-numbers
    reason: "blocked: detected policy number"
    rules:
      - id: policy-numbers/placeholder
        # Placeholder policy-number format for v0.1 (TODO: confirm real Click policy formats before
        # shipping). T2-3 tuning: the ID token must contain a digit and the bare "pol" alternative
        # was dropped, so ordinary prose ("policy layer", "policy enforcement", "the policy is") no
        # longer false-positives while a real digit-bearing reference ("póliza POL-ABC12345") still
        # blocks. Real IDs carry digits; prose words do not — this is a precision gain, not a
        # coverage cut (every previously-caught structured ID in engine_test.go has a digit).
        description: "Placeholder policy-number format for v0.1: keyword + a digit-bearing ID token (TODO: confirm real Click policy formats before shipping)."
        pattern: '(?i)\b(?:p[oó]liza|policy)[:\s#-]*[A-Z0-9-]{3,}[0-9][A-Z0-9-]*\b'
  - name: claim-ids
    reason: "blocked: detected claim identifier"
    rules:
      - id: claim-ids/placeholder
        # T2-3 tuning: dropped the bare "sin" alternative (collided with "sin conflicto", "since",
        # "single", etc.) and now require the ID token to contain a digit, so prose like "claim that",
        # "claim identifier", "the claim-ids category" no longer false-positives while a real
        # reference ("Siniestro SIN-2026-000123") still blocks.
        description: "Placeholder claim-id format for v0.1: keyword + a digit-bearing ID token (TODO: confirm real Click siniestro formats before shipping)."
        pattern: '(?i)\b(?:siniestro|claim)[:\s#-]*[A-Z0-9-]{3,}[0-9][A-Z0-9-]*\b'
  - name: customer-identifiers
    reason: "blocked: detected customer identifier"
    rules:
      - id: customer-identifiers/placeholder
        # T2-3 tuning: require the ID token to contain a digit, so "customer data", "customer
        # identifiers", "customer boundary" no longer false-positive while "customer-id CLI-998877"
        # still blocks.
        description: "Placeholder customer-id format for v0.1: keyword + a digit-bearing ID token (TODO: confirm real Click customer identifier formats before shipping)."
        pattern: '(?i)\b(?:customer|cliente)[-_\s]*(?:id|identifier|number|nro)?[:\s#-]*[A-Z0-9-]{3,}[0-9][A-Z0-9-]*\b'
