version: 2

project_name: click

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./... -count=1

builds:
  - id: click
    main: ./cmd/click
    binary: click
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    # scoop (Windows) requires exactly ONE matching windows archive; arm64 Windows devices
    # are effectively nonexistent for this pilot, so we only ship windows/amd64. darwin and
    # linux keep both amd64 and arm64 (Apple Silicon / ARM servers are common there).
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/Angel-MercadoCLK/click-ai-devkit/internal/version.Version={{ .Version }} -X github.com/Angel-MercadoCLK/click-ai-devkit/internal/version.Commit={{ .Commit }}

archives:
  - id: click-archive
    ids:
      - click
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git

release:
  github:
    owner: Angel-MercadoCLK
    name: click-ai-devkit

# v0.1: publish the scoop manifest into THIS same repo (no separate scoop-bucket repo).
# Devs add it with: scoop bucket add click https://github.com/Angel-MercadoCLK/click-ai-devkit
# GITHUB_TOKEN (default GoReleaser Actions token) is enough — no extra secret needed.
scoops:
  - name: click
    ids:
      - click-archive
    repository:
      owner: Angel-MercadoCLK
      name: click-ai-devkit
    directory: bucket
    commit_author:
      name: click-ai-devkit release bot
      email: releases@click-ai-devkit.local
    homepage: https://github.com/Angel-MercadoCLK/click-ai-devkit
    description: click-ai-devkit installer and manager for Claude Code plugins + Engram.
    license: Proprietary

# brew fast-follow (D17): fully deferred, not just skip_upload.
#
# INCIDENT NOTE (v0.1.0 first release attempt): a scaffolded `brews:` block with
# `skip_upload: true` still BROKE the release — GoReleaser tries to select a matching
# archive for the formula even when not uploading, using its own default goos/goarch/goarm
# filters (it expects an `arm` goarm=6/7 variant among other things). We only build
# amd64/arm64, so artifact selection failed with:
#   "no linux/macos archives found matching goos=[darwin linux] goarch=[amd64 arm64 arm]
#    goamd64=v1 goarm=6 ids=[click]"
# and the whole release aborted at 100% (build+archives done, but nothing published).
#
# Lesson: `skip_upload` silences PUBLISHING, not artifact SELECTION/validation. A brew
# config that isn't ready to actually match real archives must be left OUT of the config
# entirely, not merely disabled. Re-add this block only once brew support is actually being
# built (D17 fast-follow), with archive formats/goarch chosen to satisfy brew's matcher
# (typically tar.gz for darwin/linux, and being deliberate about goarm if `arm` is included).
#
# brews:
#   - name: click
#     ids:
#       - click
#     repository:
#       owner: Angel-MercadoCLK
#       name: homebrew-click
#     directory: Formula
#     homepage: https://github.com/Angel-MercadoCLK/click-ai-devkit
#     description: click-ai-devkit installer and manager for Claude Code plugins + Engram.
#     license: Proprietary
#     skip_upload: true
