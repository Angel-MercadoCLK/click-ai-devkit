version: 2

project_name: click

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: click
    main: ./cmd/click
    binary: click
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Angel-MercadoCLK/click-ai-devkit/internal/version.Version={{ .Version }} -X github.com/Angel-MercadoCLK/click-ai-devkit/internal/version.Commit={{ .Commit }}

archives:
  - id: click-archive
    ids:
      - click
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git

release:
  github:
    owner: Angel-MercadoCLK
    name: click-ai-devkit

# v0.1: publish the scoop manifest into THIS same repo (no separate scoop-bucket repo).
# Devs add it with: scoop bucket add click https://github.com/Angel-MercadoCLK/click-ai-devkit
# GITHUB_TOKEN (default GoReleaser Actions token) is enough — no extra secret needed.
scoops:
  - name: click
    ids:
      - click
    repository:
      owner: Angel-MercadoCLK
      name: click-ai-devkit
    directory: bucket
    commit_author:
      name: click-ai-devkit release bot
      email: releases@click-ai-devkit.local
    homepage: https://github.com/Angel-MercadoCLK/click-ai-devkit
    description: click-ai-devkit installer and manager for Claude Code plugins + Engram.
    license: Proprietary

# brew fast-follow (D17): deferred. skip_upload keeps the formula generated locally in the
# release artifacts without pushing anywhere, so no homebrew-click repo/token is needed yet.
brews:
  - name: click
    ids:
      - click
    repository:
      owner: Angel-MercadoCLK
      name: homebrew-click
    directory: Formula
    homepage: https://github.com/Angel-MercadoCLK/click-ai-devkit
    description: click-ai-devkit installer and manager for Claude Code plugins + Engram.
    license: Proprietary
    skip_upload: true
